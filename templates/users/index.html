{% extends 'base.html' %}

{% block content %}
<h2>Liste des utilisateurs</h2>

<a href="/users/create" class="btn btn-primary mb-3">Ajouter</a>

<table class="table table-bordered">
    <tr>
        <th>Nom</th>
        <th>Email</th>
        <th>Actions</th>
    </tr>

    {% for user in users %}
    <tr>
        <td>{{ user.name }}</td>
        <td>{{ user.email }}</td>
        <td>
            <a href="/users/edit/{{ user.id }}" class="btn btn-warning btn-sm">Modifier</a>
            <a href="/users/delete/{{ user.id }}" class="btn btn-danger btn-sm">Supprimer</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
