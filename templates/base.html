<!DOCTYPE html>
<html>
<head>
    <title>User Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../static/style.css" rel="stylesheet">

</head>
<body>
    {% if current_user.is_authenticated %}
        <p>Bienvenue {{ current_user.name }}</p>
    {% else %}
        <p>Vous n'êtes pas connecté</p>
    {% endif %}
    <div class="row mt-4 justify-content-center">
        <div class="col-lg-3">
             <a href="/users/" class="btn btn-primary mb-3">Utilisateurs</a>                   
        </div>
        <div class="col-lg-3">
             <a href="/professeurs/list" class="btn btn-primary mb-3">Professeurs</a>                   
        </div>
        <div class="col-lg-3">
             <a href="/cours/list" class="btn btn-primary mb-3">Cours</a>                   
        </div>
        {% if current_user.is_authenticated %}
            <div class="col-lg-3">
                <a href="/logout" class="btn btn-danger mb-3">Se deconnecter</a>                   
            </div>
        {% else %}
            <div class="col-lg-3">
                <a href="/login" class="btn btn-danger mb-3">Se deconnecter</a>                   
            </div>
        {% endif %}
        
    </div>
    

    <div class="container mt-5">
        {% block content %}
        
        {% endblock %}
    </div>

</body>
</html>
